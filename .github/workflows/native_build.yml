name: Native Build

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build_win:
    runs-on: [windows-2022]
    strategy:
      fail-fast: false
      matrix:
        include:
          - toolset: v142
            configuration: RelWithDebInfo
            vcvars: -vcvars_ver=14.29
          - toolset: v143
            configuration: RelWithDebInfo
            vcvars: ""
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Configure and build
      shell: cmd
      run: |
        call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" ${{matrix.vcvars}}
        cmake -B build\${{matrix.toolset}} -G Ninja -DCMAKE_BUILD_TYPE=${{matrix.configuration}} -DCMAKE_NINJA_FORCE_RESPONSE_FILE=ON -DCMAKE_ARCHIVE_OUTPUT_DIRECTORY=%CD%\build\${{matrix.toolset}}\${{matrix.configuration}}
        cmake --build build\${{matrix.toolset}} --parallel 1
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: OcctImportJS_VS_${{matrix.toolset}}_${{matrix.configuration}}
        path: build/${{matrix.toolset}}/${{matrix.configuration}}/occt-import-js.lib
    - name: Upload release asset
      if: github.event_name == 'release'
      shell: pwsh
      env:
        GH_TOKEN: ${{github.token}}
        RELEASE_TAG: ${{github.event.release.tag_name}}
      run: |
        $assetName = "occt-import-js-$env:RELEASE_TAG-native-${{matrix.toolset}}-${{matrix.configuration}}.zip"
        Compress-Archive -Path "build/${{matrix.toolset}}/${{matrix.configuration}}/occt-import-js.lib" -DestinationPath $assetName -Force
        gh release upload $env:RELEASE_TAG $assetName --clobber

  build_mac:
    runs-on: [macos-15-intel]
    strategy:
      matrix:
        xcode: [16.4]
        configuration: [RelWithDebInfo]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Setup xcode
      if: runner.os == 'macOS'
      run: sudo xcode-select -s /Applications/Xcode_${{matrix.xcode}}.app
    - name: Configure
      run: cmake -B build/${{matrix.xcode}} -G "Xcode" -DCMAKE_OSX_ARCHITECTURES="x86_64"
    - name: Build
      run: cmake --build build/${{matrix.xcode}} --config ${{matrix.configuration}}
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: OcctImportJS_Xcode_${{matrix.xcode}}_${{matrix.configuration}}
        path: build/${{matrix.xcode}}/${{matrix.configuration}}/libocct-import-js.a
    - name: Upload release asset
      if: github.event_name == 'release'
      env:
        GH_TOKEN: ${{github.token}}
        RELEASE_TAG: ${{github.event.release.tag_name}}
      run: |
        asset_name="occt-import-js-${RELEASE_TAG}-native-xcode-${{matrix.xcode}}-${{matrix.configuration}}.zip"
        zip -j "$asset_name" "build/${{matrix.xcode}}/${{matrix.configuration}}/libocct-import-js.a"
        gh release upload "$RELEASE_TAG" "$asset_name" --clobber

  publish_headers:
    runs-on: [ubuntu-latest]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Headers
        path: occt-import-js/src/*.hpp
    - name: Upload release asset
      if: github.event_name == 'release'
      env:
        GH_TOKEN: ${{github.token}}
        RELEASE_TAG: ${{github.event.release.tag_name}}
      run: |
        asset_name="occt-import-js-${RELEASE_TAG}-headers.zip"
        zip -j "$asset_name" occt-import-js/src/*.hpp
        gh release upload "$RELEASE_TAG" "$asset_name" --clobber
