name: Rebuild Dist

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  rebuild-dist:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get Emscripten
        run: ./tools/setup_emscripten_win.bat

      - name: Rebuild dist
        run: ./tools/build_wasm_win_dist.bat

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error
