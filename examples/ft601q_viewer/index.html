<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="content-type" content="text/html;charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FT601Q STEP Viewer</title>

    <script src="https://cdn.jsdelivr.net/npm/three@0.138.3/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.138.3/examples/js/controls/OrbitControls.js"></script>

    <style>
        :root
        {
            --page: #f7f4ee;
            --panel: #fffdfa;
            --ink: #1f1b17;
            --muted: #756d63;
            --line: #e4ded2;
            --viewer: #ded3bc;
            --accent: #a35d2a;
            --accent-soft: #f1dfd2;
            --tag: #eee9e1;
            --shadow: 0 20px 60px rgba(30, 25, 18, 0.10);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        *
        {
            box-sizing: border-box;
        }

        html,
        body
        {
            margin: 0px;
            min-height: 100%;
            background: var(--page);
            color: var(--ink);
        }

        body
        {
            padding: 28px;
        }

        .shell
        {
            width: min(1280px, 100%);
            margin: 0px auto;
            border: 1px solid var(--line);
            border-radius: 30px;
            background: rgba(255, 253, 249, 0.80);
            box-shadow: var(--shadow);
            padding: 28px;
        }

        .viewer
        {
            position: relative;
            height: min(68vh, 920px);
            min-height: 430px;
            border: 1px solid #d8cfbe;
            border-radius: 26px;
            overflow: hidden;
            background: radial-gradient(circle at 42% 22%, #f8f4ea 0%, var(--viewer) 62%, #d1c5ae 100%);
        }

        #model-view
        {
            display: block;
            width: 100%;
            height: 100%;
        }

        .status
        {
            position: absolute;
            inset: auto 24px 24px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            pointer-events: none;
        }

        .status-message
        {
            max-width: 680px;
            border: 1px solid rgba(84, 75, 63, 0.20);
            border-radius: 999px;
            background: rgba(255, 253, 249, 0.88);
            padding: 10px 16px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.35;
            box-shadow: 0 12px 30px rgba(38, 31, 23, 0.08);
        }

        .status-message[data-state="error"]
        {
            color: #861f1f;
            background: #fff4f2;
            border-color: #e7c1ba;
        }

        .content
        {
            padding: 30px 4px 0px;
        }

        .title-row
        {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: start;
            gap: 20px;
            margin-bottom: 30px;
        }

        h1
        {
            margin: 0px;
            font-size: clamp(30px, 3vw, 42px);
            line-height: 1.05;
            font-weight: 800;
        }

        .meta
        {
            margin-top: 18px;
            color: var(--muted);
            font-size: 22px;
            line-height: 1.2;
        }

        .badges
        {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
            padding-top: 10px;
        }

        .badge
        {
            border-radius: 999px;
            background: var(--tag);
            padding: 10px 18px;
            color: var(--ink);
            font-size: 20px;
            font-weight: 800;
            line-height: 1;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }

        .badge.accent
        {
            color: #965927;
            background: var(--accent-soft);
        }

        .stats
        {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .stat
        {
            min-height: 112px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: var(--panel);
            padding: 22px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .label
        {
            color: var(--muted);
            font-size: 18px;
            line-height: 1.1;
            letter-spacing: 0px;
            text-transform: uppercase;
        }

        .value
        {
            margin-top: 16px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: clamp(24px, 2.4vw, 30px);
            line-height: 1.05;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sections
        {
            display: grid;
            grid-template-columns: 1fr;
            gap: 26px;
            margin-top: 28px;
        }

        h2
        {
            margin: 0px 0px 14px;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.1;
            font-weight: 500;
            letter-spacing: 0px;
            text-transform: uppercase;
        }

        .chips
        {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .chip
        {
            min-height: 52px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--panel);
            padding: 10px 18px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 20px;
            line-height: 1;
        }

        .swatch
        {
            width: 28px;
            height: 28px;
            flex: 0 0 28px;
            border-radius: 50%;
            border: 1px solid rgba(31, 27, 23, 0.18);
        }

        .param-grid
        {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
        }

        .param
        {
            border: 1px solid var(--line);
            border-radius: 18px;
            background: var(--panel);
            padding: 16px;
            min-width: 0px;
        }

        .param .label
        {
            font-size: 13px;
        }

        .param .value
        {
            margin-top: 10px;
            font-size: 16px;
        }

        @media (max-width: 760px)
        {
            body
            {
                padding: 12px;
            }

            .shell
            {
                padding: 14px;
                border-radius: 22px;
            }

            .viewer
            {
                height: 54vh;
                min-height: 300px;
                border-radius: 18px;
            }

            .status
            {
                inset: auto 12px 12px 12px;
            }

            .status-message
            {
                width: 100%;
                border-radius: 16px;
                font-size: 13px;
            }

            .content
            {
                padding-top: 22px;
            }

            .title-row,
            .stats,
            .param-grid
            {
                grid-template-columns: 1fr;
            }

            .badges
            {
                justify-content: flex-start;
            }

            .meta
            {
                font-size: 18px;
            }

            .stat
            {
                min-height: 96px;
            }

            .chip
            {
                width: 100%;
                justify-content: flex-start;
                font-size: 17px;
            }
        }
    </style>
</head>

<body>
    <main class="shell">
        <section class="viewer" aria-label="FT601Q model viewport">
            <canvas id="model-view"></canvas>
            <div class="status">
                <div id="status-message" class="status-message">Loading FT601Q.step</div>
            </div>
        </section>

        <section class="content">
            <div class="title-row">
                <div>
                    <h1>FT601Q</h1>
                    <div id="file-meta" class="meta">FT601Q.step</div>
                </div>
                <div class="badges" aria-label="formats">
                    <span class="badge accent">WASM</span>
                    <span class="badge">STEP</span>
                </div>
            </div>

            <div id="stats" class="stats"></div>

            <div class="sections">
                <section>
                    <h2>Colors Used</h2>
                    <div id="colors-used" class="chips"></div>
                </section>

                <section>
                    <h2>Import Parameters</h2>
                    <div id="import-params" class="param-grid"></div>
                </section>
            </div>
        </section>
    </main>

    <script type="module">
        import occtimportjs from '../../dist/occt-import-js.js';

        var ModelUrl = 'FT601Q.step';
        var ImportParams = {
            linearUnit : 'millimeter',
            linearDeflectionType : 'bounding_box_ratio',
            linearDeflection : 0.001,
            angularDeflection : 0.5,
            includeBrepFaces : false
        };
        var ShowEdges = false;

        var SceneState = {
            renderer : null,
            camera : null,
            controls : null,
            scene : null,
            model : null,
            renderRequested : false
        };
        var MaterialCache = {};

        function FormatNumber (value)
        {
            return Math.round (value).toLocaleString ('en-US');
        }

        function FormatSeconds (milliseconds)
        {
            return (milliseconds / 1000.0).toFixed (2) + ' s';
        }

        function FormatFileSize (bytes)
        {
            return (bytes / (1024.0 * 1024.0)).toFixed (2) + ' MB';
        }

        function FormatBounds (bounds)
        {
            return bounds.size.map (function (value) {
                return value.toFixed (value >= 10.0 ? 2 : 3);
            }).join (' x ');
        }

        function ColorArrayToHex (color)
        {
            if (!color) {
                return '#ffffff';
            }

            return '#' + color.map (function (channel) {
                var value = Math.round (Math.max (0.0, Math.min (1.0, channel)) * 255.0);
                return value.toString (16).padStart (2, '0');
            }).join ('');
        }

        function SourceColorHex (mesh)
        {
            return ColorArrayToHex (mesh.color);
        }

        function DisplayColorHex (mesh)
        {
            var name = mesh.name || '';
            var sourceHex = SourceColorHex (mesh);

            if (name === 'Thermal_Shape') {
                return '#b8bbc0';
            }

            if (sourceHex === '#080808') {
                return '#101319';
            }

            if (sourceHex === '#9a9a9a') {
                return '#aeb2b7';
            }

            return '#f4f1eb';
        }

        function AddColor (colors, color)
        {
            if (colors.indexOf (color) === -1) {
                colors.push (color);
            }
        }

        function CountHierarchyNodes (node)
        {
            if (!node) {
                return 0;
            }

            var children = node.children || [];
            return 1 + children.reduce (function (sum, child) {
                return sum + CountHierarchyNodes (child);
            }, 0);
        }

        function MergeBounds (min, max, bounds)
        {
            for (var axis = 0; axis < 3; axis++) {
                min[axis] = Math.min (min[axis], bounds.min[axis]);
                max[axis] = Math.max (max[axis], bounds.max[axis]);
            }
        }

        function CalculateMeshBounds (mesh)
        {
            if (mesh.bounds) {
                return mesh.bounds;
            }

            var min = [Infinity, Infinity, Infinity];
            var max = [-Infinity, -Infinity, -Infinity];
            var positions = mesh.attributes.position.array;
            for (var i = 0; i < positions.length; i += 3) {
                for (var axis = 0; axis < 3; axis++) {
                    min[axis] = Math.min (min[axis], positions[i + axis]);
                    max[axis] = Math.max (max[axis], positions[i + axis]);
                }
            }

            return {
                min : min,
                max : max,
                size : max.map (function (value, index) {
                    return value - min[index];
                })
            };
        }

        function AnalyzeResult (result, fileBytes, renderTime)
        {
            var min = [Infinity, Infinity, Infinity];
            var max = [-Infinity, -Infinity, -Infinity];
            var triangles = 0;
            var vertices = 0;
            var coloredFaces = 0;
            var colors = [];

            result.meshes.forEach (function (mesh) {
                triangles += mesh.triangle_count !== undefined ? mesh.triangle_count : mesh.index.array.length / 3;
                vertices += mesh.vertex_count !== undefined ? mesh.vertex_count : mesh.attributes.position.array.length / 3;
                var meshColor = DisplayColorHex (mesh);
                AddColor (colors, meshColor);
                MergeBounds (min, max, CalculateMeshBounds (mesh));

                if (mesh.colored_brep_face_count !== undefined) {
                    coloredFaces += mesh.colored_brep_face_count;
                } else {
                    (mesh.brep_faces || []).forEach (function (face) {
                        if (face.color) {
                            coloredFaces += 1;
                        }
                    });
                }

                (mesh.brep_face_runs || mesh.brep_faces || []).forEach (function (face) {
                    if (face.color) {
                        AddColor (colors, ColorArrayToHex (face.color));
                    } else {
                        AddColor (colors, meshColor);
                    }
                });
            });

            if (min[0] === Infinity) {
                min = [0.0, 0.0, 0.0];
                max = [0.0, 0.0, 0.0];
            }

            var bounds = {
                min : min,
                max : max,
                size : max.map (function (value, index) {
                    return value - min[index];
                })
            };

            return {
                fileBytes : fileBytes,
                meshes : result.meshes.length,
                triangles : triangles,
                vertices : vertices,
                colors : colors,
                coloredFaces : coloredFaces,
                topLevel : (result.root.children || []).length,
                hierarchyNodes : CountHierarchyNodes (result.root),
                bounds : bounds,
                renderTime : renderTime
            };
        }

        function GetSharedMaterial (color)
        {
            if (MaterialCache[color] === undefined) {
                MaterialCache[color] = new THREE.MeshLambertMaterial ({
                    color : new THREE.Color (color),
                    side : THREE.DoubleSide
                });
            }
            return MaterialCache[color];
        }

        function BuildMesh (geometryMesh, showEdges)
        {
            var geometry = new THREE.BufferGeometry ();
            var positions = geometryMesh.attributes.position.array;
            var indices = geometryMesh.index.array;

            geometry.setAttribute ('position', new THREE.BufferAttribute (positions, 3));
            if (geometryMesh.attributes.normal) {
                geometry.setAttribute ('normal', new THREE.BufferAttribute (geometryMesh.attributes.normal.array, 3));
            }
            geometry.setIndex (new THREE.BufferAttribute (indices, 1));
            geometry.name = geometryMesh.name;

            var materials = [];
            var materialIndexByColor = {};

            function GetMaterialIndex (color)
            {
                if (materialIndexByColor[color] !== undefined) {
                    return materialIndexByColor[color];
                }

                var materialIndex = materials.length;
                materials.push (GetSharedMaterial (color));
                materialIndexByColor[color] = materialIndex;
                return materialIndex;
            }

            var defaultColor = DisplayColorHex (geometryMesh);
            var defaultMaterialIndex = GetMaterialIndex (defaultColor);
            var brepFaceRuns = geometryMesh.brep_face_runs || geometryMesh.brep_faces || [];
            if (brepFaceRuns.length > 0) {
                brepFaceRuns.forEach (function (face) {
                    if (face.last < face.first) {
                        return;
                    }

                    var faceColor = face.color ? ColorArrayToHex (face.color) : defaultColor;
                    var faceMaterialIndex = GetMaterialIndex (faceColor);
                    geometry.addGroup (
                        face.first * 3,
                        (face.last - face.first + 1) * 3,
                        faceMaterialIndex
                    );
                });
            } else {
                geometry.addGroup (0, indices.length, defaultMaterialIndex);
            }

            var mesh = new THREE.Mesh (geometry, materials);
            mesh.name = geometryMesh.name;

            var edges = null;
            if (showEdges) {
                var edgeGeometry = new THREE.EdgesGeometry (geometry, 36);
                var edgeMaterial = new THREE.LineBasicMaterial ({
                    color : 0x061022,
                    transparent : true,
                    opacity : 0.18
                });
                edges = new THREE.LineSegments (edgeGeometry, edgeMaterial);
                edges.renderOrder = mesh.renderOrder + 1;
            }

            return {
                mesh : mesh,
                edges : edges
            };
        }

        function BuildModel (result)
        {
            var group = new THREE.Group ();

            result.meshes.forEach (function (resultMesh) {
                var builtMesh = BuildMesh (resultMesh, ShowEdges);
                group.add (builtMesh.mesh);
                if (builtMesh.edges) {
                    group.add (builtMesh.edges);
                }
            });

            return group;
        }

        function SetupScene ()
        {
            var canvas = document.getElementById ('model-view');
            var viewer = canvas.parentElement;
            var width = viewer.clientWidth;
            var height = viewer.clientHeight;

            SceneState.renderer = new THREE.WebGLRenderer ({
                canvas : canvas,
                antialias : true,
                alpha : true
            });
            if (SceneState.renderer.debug) {
                SceneState.renderer.debug.checkShaderErrors = false;
            }
            SceneState.renderer.setPixelRatio (Math.min (window.devicePixelRatio || 1, 2));
            SceneState.renderer.setSize (width, height, false);
            SceneState.camera = new THREE.PerspectiveCamera (38, width / height, 0.01, 1000.0);
            SceneState.camera.up.set (0.0, 0.0, 1.0);

            SceneState.scene = new THREE.Scene ();
            SceneState.scene.add (new THREE.HemisphereLight (0xffffff, 0xb89c76, 0.64));

            var keyLight = new THREE.DirectionalLight (0xffffff, 0.92);
            keyLight.position.set (25.0, -32.0, 28.0);
            SceneState.scene.add (keyLight);

            var fillLight = new THREE.DirectionalLight (0xf5dfbd, 0.28);
            fillLight.position.set (-24.0, 16.0, 16.0);
            SceneState.scene.add (fillLight);

            SceneState.controls = new THREE.OrbitControls (SceneState.camera, SceneState.renderer.domElement);
            SceneState.controls.enableDamping = true;
            SceneState.controls.dampingFactor = 0.08;
            SceneState.controls.enablePan = false;
            SceneState.controls.addEventListener ('change', RequestRender);
        }

        function FrameModel (model, bounds)
        {
            var center = new THREE.Vector3 (
                (bounds.min[0] + bounds.max[0]) / 2.0,
                (bounds.min[1] + bounds.max[1]) / 2.0,
                (bounds.min[2] + bounds.max[2]) / 2.0
            );
            var maxSize = Math.max (bounds.size[0], bounds.size[1], bounds.size[2], 1.0);

            model.position.set (-center.x, -center.y, -center.z);

            SceneState.camera.near = Math.max (0.01, maxSize / 100.0);
            SceneState.camera.far = maxSize * 100.0;
            var cameraDirection = new THREE.Vector3 (0.92, -1.52, 0.78).normalize ();
            var cameraDistance = maxSize * (SceneState.camera.aspect < 0.8 ? 3.45 : 1.94);
            SceneState.camera.position.copy (cameraDirection.multiplyScalar (cameraDistance));
            SceneState.camera.lookAt (0.0, 0.0, 0.0);
            SceneState.camera.updateProjectionMatrix ();

            SceneState.controls.target.set (0.0, 0.0, 0.0);
            SceneState.controls.minDistance = maxSize * 0.72;
            SceneState.controls.maxDistance = maxSize * 6.0;
            SceneState.controls.update ();
        }

        function RenderFrame ()
        {
            SceneState.renderRequested = false;
            var needsAnotherFrame = SceneState.controls.update ();
            SceneState.renderer.render (SceneState.scene, SceneState.camera);
            if (needsAnotherFrame) {
                RequestRender ();
            }
        }

        function RequestRender ()
        {
            if (SceneState.renderRequested || !SceneState.renderer) {
                return;
            }

            SceneState.renderRequested = true;
            window.requestAnimationFrame (RenderFrame);
        }

        function Resize ()
        {
            if (!SceneState.renderer || !SceneState.camera) {
                return;
            }

            var canvas = document.getElementById ('model-view');
            var viewer = canvas.parentElement;
            var width = viewer.clientWidth;
            var height = viewer.clientHeight;
            SceneState.camera.aspect = width / height;
            SceneState.camera.updateProjectionMatrix ();
            SceneState.renderer.setSize (width, height, false);
            RequestRender ();
        }

        function RenderStats (stats)
        {
            var statItems = [
                ['Meshes', FormatNumber (stats.meshes)],
                ['Triangles', FormatNumber (stats.triangles)],
                ['Vertices', FormatNumber (stats.vertices)],
                ['Colors', FormatNumber (stats.colors.length)],
                ['Colored Faces', FormatNumber (stats.coloredFaces)],
                ['Top Level', FormatNumber (stats.topLevel)],
                ['Hierarchy Nodes', FormatNumber (stats.hierarchyNodes)],
                ['Bounds (mm)', FormatBounds (stats.bounds)],
                ['Total Render Time', FormatSeconds (stats.renderTime)]
            ];

            document.getElementById ('stats').innerHTML = statItems.map (function (item) {
                return '<article class="stat"><div class="label">' + item[0] + '</div><div class="value">' + item[1] + '</div></article>';
            }).join ('');

            document.getElementById ('file-meta').textContent = 'FT601Q.step | ' + FormatFileSize (stats.fileBytes);
            document.getElementById ('colors-used').innerHTML = stats.colors.map (function (color) {
                return '<span class="chip"><span class="swatch" style="background:' + color + '"></span>' + color + '</span>';
            }).join ('');
        }

        function RenderImportParams ()
        {
            var params = [
                ['Linear Unit', ImportParams.linearUnit],
                ['Deflection Type', ImportParams.linearDeflectionType],
                ['Linear Deflection', String (ImportParams.linearDeflection)],
                ['Angular Deflection', String (ImportParams.angularDeflection)]
            ];

            document.getElementById ('import-params').innerHTML = params.map (function (param) {
                return '<article class="param"><div class="label">' + param[0] + '</div><div class="value">' + param[1] + '</div></article>';
            }).join ('');
        }

        function SetStatus (message, state)
        {
            var status = document.getElementById ('status-message');
            status.textContent = message;
            status.dataset.state = state || 'ready';
        }

        async function LoadModel ()
        {
            var startTime = performance.now ();
            SetupScene ();
            RenderImportParams ();

            var occt = await occtimportjs ();
            SetStatus ('Fetching FT601Q.step');
            var response = await fetch (ModelUrl);
            if (!response.ok) {
                throw new Error ('Failed to fetch ' + ModelUrl + ': ' + response.status + ' ' + response.statusText);
            }

            var buffer = await response.arrayBuffer ();
            SetStatus ('Importing STEP geometry');
            var result = occt.ReadStepFile (new Uint8Array (buffer), ImportParams);
            if (!result.success) {
                throw new Error ('OpenCascade could not import FT601Q.step');
            }

            SetStatus ('Building render meshes');
            var stats = AnalyzeResult (result, buffer.byteLength, 0.0);
            SceneState.model = BuildModel (result);
            SceneState.scene.add (SceneState.model);
            FrameModel (SceneState.model, stats.bounds);

            stats.renderTime = performance.now () - startTime;
            RenderStats (stats);
            SetStatus ('Ready');
            RequestRender ();
        }

        window.addEventListener ('resize', Resize);
        LoadModel ().catch (function (error) {
            console.error (error);
            SetStatus (error.message, 'error');
        });
    </script>
</body>

</html>
